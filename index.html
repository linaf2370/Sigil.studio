<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGIL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e0e;
      --surface:    #141414;
      --border:     #242424;
      --text:       #e8e4dc;
      --muted:      #6b6660;
      --accent:     #c4614a;
      --accent-dim: #9e4d3b;
      --rule:       #1e1e1e;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-ui:    'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── PROJECTS BAR ─────────────────────────────── */
    #projects-bar {
      display: flex;
      align-items: stretch;
      height: 36px;
      background: #0a0a0a;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      overflow: hidden;
    }

    #projects-tabs {
      display: flex;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    #projects-tabs::-webkit-scrollbar { display: none; }

    .project-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-right: 0.5px solid rgba(255,255,255,0.05);
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      transition: background 0.1s;
      flex-shrink: 0;
      min-width: 0;
      user-select: none;
    }

    .project-tab:hover { background: rgba(255,255,255,0.02); }

    .project-tab.active { background: rgba(255,255,255,0.03); }

    .project-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1.5px;
      background: var(--accent);
    }

    .tab-name {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.1s;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-tab.active .tab-name { color: var(--text); }

    .tab-close {
      background: none;
      border: none;
      color: #2e2c2a;
      font-size: 9px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.1s;
      font-family: var(--font-ui);
    }

    .tab-close:hover { color: var(--muted); }

    #new-project-btn {
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: transparent;
      border: none;
      border-left: 0.5px solid rgba(255,255,255,0.06);
      color: #3a3835;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    #new-project-btn:hover { color: var(--muted); }
    #new-project-btn::before { content: '[ '; }
    #new-project-btn::after  { content: ' ]'; }

    /* ── APP GRID ─────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── SIDEBAR ──────────────────────────────────── */
    #sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .sidebar-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 28px 22px;
      flex-shrink: 0;
    }

    .logotype {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 21px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--text);
    }

    .version {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 300;
    }

    .sidebar-section {
      padding: 18px 28px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .field-label::before { content: '[ '; }
    .field-label::after  { content: ' ]'; }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.03em;
      padding: 8px 0;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus { border-bottom-color: var(--muted); }

    input::placeholder,
    textarea::placeholder { color: #3a3734; font-weight: 300; }

    textarea { height: 78px; line-height: 1.6; }

    /* ── STYLE PICKER ─────────────────────────────── */
    .style-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .style-option:last-child { grid-column: 1 / -1; }

    .style-option input[type="radio"] { display: none; }

    .style-option label {
      display: block;
      padding: 9px 12px;
      font-size: 10px;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--muted);
      border: 1px solid var(--border);
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: color 0.1s, background 0.1s, border-left-color 0.1s;
      user-select: none;
    }

    .style-option label:hover { color: var(--text); }

    .style-option input[type="radio"]:checked + label {
      color: var(--text);
      border-left-color: var(--accent);
      background: var(--surface);
    }

    /* ── MOODBOARD ────────────────────────────────── */
    #moodboard-zone {
      border: 1px dashed var(--border);
      min-height: 72px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    #moodboard-zone:hover { border-color: var(--muted); }

    #moodboard-zone.drag-over {
      border-color: var(--muted);
      background: var(--surface);
    }

    .moodboard-prompt {
      text-align: center;
      color: #3a3734;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 6px 0;
      pointer-events: none;
    }

    .moodboard-thumbs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .thumb-item {
      position: relative;
      width: 74px;
      height: 52px;
      flex-shrink: 0;
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(14,14,14,0.8);
      color: var(--text);
      border: none;
      width: 16px;
      height: 16px;
      font-size: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.1s;
    }

    .thumb-remove:hover { background: rgba(14,14,14,1); }

    #moodboard-file-input { display: none; }

    /* ── GENERATE BUTTON ──────────────────────────── */
    .generate-wrap {
      padding: 18px 28px 24px;
      border-top: 1px solid var(--rule);
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      background: var(--bg);
      margin-top: auto;
    }

    #generate-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px 20px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #generate-btn:hover:not(:disabled) { background: var(--accent-dim); }

    #generate-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── CANVAS ───────────────────────────────────── */
    #canvas {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      background: var(--bg);
    }

    .canvas-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 32px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      gap: 20px;
    }

    .canvas-meta span {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    #meta-brand { flex: 1; }

    #clear-history-btn {
      background: transparent;
      border: none;
      color: #302e2c;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.1s;
      flex-shrink: 0;
    }

    #clear-history-btn:hover { color: var(--muted); }
    #clear-history-btn::before { content: '[ '; }
    #clear-history-btn::after  { content: ' ]'; }

    /* ── CANVAS HISTORY ───────────────────────────── */
    #canvas-history {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #canvas-history::-webkit-scrollbar { width: 3px; }
    #canvas-history::-webkit-scrollbar-track { background: transparent; }
    #canvas-history::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .generation-block {
      padding: 28px;
    }

    .generation-block + .generation-block {
      border-top: 0.5px solid rgba(255,255,255,0.05);
    }

    .generation-block.stale .logo-slot {
      opacity: 0.4;
    }

    .generation-block.stale .slot-svg-wrap.has-logo {
      cursor: pointer;
    }

    .generation-header {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #2e2c2a;
      margin-bottom: 20px;
    }

    .canvas-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* ── LOGO SLOT ────────────────────────────────── */
    .logo-slot {
      border: 0.5px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 14px;
    }

    .slot-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3e3b38;
      font-weight: 400;
    }

    .slot-mark-wrap {
      background: #1a1a1a;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .slot-mark-wrap.has-mark { cursor: pointer; }
    .slot-mark-wrap.has-mark:hover { background: #1e1e1e; }

    .slot-mark-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .slot-wordmark-wrap {
      background: #1a1a1a;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .slot-wordmark-wrap.has-logo { cursor: pointer; }
    .slot-wordmark-wrap.has-logo:hover { background: #1e1e1e; }

    .slot-wordmark-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .slot-loading-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      pointer-events: none;
    }

    .loading-rect {
      width: 72%;
      height: 48%;
      background: #252525;
      animation: loading-pulse 2.2s ease-in-out infinite;
    }

    @keyframes loading-pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.6; }
    }

    .loading-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3a3835;
      font-weight: 300;
    }

    .slot-error {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      color: var(--accent);
      padding: 12px 16px;
      line-height: 1.8;
      pointer-events: none;
    }

    .slot-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 20px;
    }

    .tag {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: #3e3b38;
    }

    .tag::before { content: '[ '; }
    .tag::after  { content: ' ]'; }

    .slot-exports {
      display: flex;
      gap: 8px;
    }

    .export-btn {
      flex: 1;
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.12);
      color: #4a4744;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 8px 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .export-btn:hover:not(:disabled) {
      color: var(--text);
      border-color: rgba(255,255,255,0.3);
    }

    .export-btn:disabled { opacity: 0.18; cursor: not-allowed; }

    .export-btn::before { content: '[ '; }
    .export-btn::after  { content: ' ]'; }

    /* ── LIGHTBOX ─────────────────────────────────── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(14,14,14,0.95);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lightbox.hidden { display: none; }

    .lightbox-inner {
      display: flex;
      flex-direction: column;
      width: min(860px, 88vw);
    }

    .lb-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 14px;
    }

    .lb-meta-info {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #3e3b38;
      font-weight: 300;
    }

    .lb-close-btn {
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.15);
      color: #5a5754;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .lb-close-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .lb-close-btn::before { content: '[ '; }
    .lb-close-btn::after  { content: ' ]'; }

    #lb-mark-wrap {
      background: #1a1a1a;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 420px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-mark-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #lb-wordmark-wrap {
      background: #1a1a1a;
      width: 100%;
      height: 110px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }

    #lb-wordmark-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .lb-export-row {
      display: flex;
      gap: 8px;
      padding: 14px 0 0;
    }

    .lb-export-btn {
      flex: 1;
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.12);
      color: #4a4744;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 10px 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .lb-export-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .lb-export-btn::before { content: '[ '; }
    .lb-export-btn::after  { content: ' ]'; }
  </style>
</head>
<body>

<!-- ── PROJECTS BAR ──────────────────────────────── -->
<div id="projects-bar">
  <div id="projects-tabs"></div>
  <button id="new-project-btn">+ New</button>
</div>

<div id="app">

  <!-- ── SIDEBAR ────────────────────────────────── -->
  <aside id="sidebar">

    <div class="sidebar-header">
      <span class="logotype">Sigil</span>
      <span class="version">V0.1</span>
    </div>

    <div class="sidebar-section">
      <label class="field-label" for="brand-input">Brand</label>
      <input type="text" id="brand-input" placeholder="Brand name" autocomplete="off" spellcheck="false">
    </div>

    <div class="sidebar-section">
      <label class="field-label" for="brief-input">Brief</label>
      <textarea id="brief-input" placeholder="Describe the brand — what it does, who it's for, what it should feel like…"></textarea>
    </div>

    <div class="sidebar-section">
      <span class="field-label">Style</span>
      <div class="style-grid">
        <div class="style-option">
          <input type="radio" name="style" id="s-wordmark" value="wordmark" checked>
          <label for="s-wordmark">Wordmark</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="s-monogram" value="monogram">
          <label for="s-monogram">Monogram</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="s-letterform" value="letterform">
          <label for="s-letterform">Letterform</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="s-abstract" value="abstract">
          <label for="s-abstract">Abstract</label>
        </div>
        <div class="style-option">
          <input type="radio" name="style" id="s-logomark" value="logomark-wordmark">
          <label for="s-logomark">Logomark + Wordmark</label>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <span class="field-label">Moodboard</span>
      <div id="moodboard-zone">
        <div class="moodboard-prompt" id="moodboard-prompt">Drop images or click to upload</div>
        <div class="moodboard-thumbs" id="moodboard-thumbs" style="display:none"></div>
      </div>
      <input type="file" id="moodboard-file-input" accept="image/*" multiple>
    </div>

    <div class="generate-wrap">
      <button id="generate-btn">Generate</button>
    </div>

  </aside>

  <!-- ── CANVAS ─────────────────────────────────── -->
  <main id="canvas">

    <div class="canvas-meta">
      <span id="meta-brand">—</span>
      <span id="meta-count">—</span>
      <button id="clear-history-btn">Clear History</button>
      <span id="meta-date">—</span>
    </div>

    <div id="canvas-history"></div>

  </main>
</div>

<!-- ── LIGHTBOX ──────────────────────────────────── -->
<div id="lightbox" class="hidden">
  <div class="lightbox-inner">
    <div class="lb-meta">
      <span class="lb-meta-info" id="lb-meta-info">—</span>
      <button class="lb-close-btn" id="lb-close-btn">Close</button>
    </div>
    <div id="lb-mark-wrap"></div>
    <div id="lb-wordmark-wrap"></div>
    <div class="lb-export-row">
      <button class="lb-export-btn" id="lb-svg-btn">Export SVG</button>
      <button class="lb-export-btn" id="lb-png-btn">Export PNG</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────
const state = {
  projects: [],          // [{id, brandName, brief, style, moodboardImages, moodboardAnalysis, generations}]
  currentProjectId: null,
  generating: false,
  lightboxGenId: null,
  lightboxSlot: null,
};

// ── DOM REFS ───────────────────────────────────────
const $ = id => document.getElementById(id);
const brandInput      = $('brand-input');
const briefInput      = $('brief-input');
const generateBtn     = $('generate-btn');
const moodboardZone   = $('moodboard-zone');
const moodboardThumbs = $('moodboard-thumbs');
const moodboardPrompt = $('moodboard-prompt');
const moodboardFile   = $('moodboard-file-input');
const metaBrand       = $('meta-brand');
const metaCount       = $('meta-count');
const metaDate        = $('meta-date');
const clearHistoryBtn = $('clear-history-btn');
const canvasHistory   = $('canvas-history');
const lightbox        = $('lightbox');
const projectsTabs    = $('projects-tabs');

// ── UTILS ──────────────────────────────────────────
function uid()        { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmtDate(d)   { return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }).toUpperCase(); }
function fmtTime(d)   { return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
function slug(s)      { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'sigil'; }
function escHtml(s)   { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function wait(ms)     { return new Promise(r => setTimeout(r, ms)); }

function toast(msg) {
  const el = document.createElement('div');
  Object.assign(el.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: '#1a1a1a', color: 'var(--text)', border: '1px solid var(--border)',
    fontFamily: 'var(--font-ui)', fontSize: '11px', letterSpacing: '0.12em',
    textTransform: 'uppercase', padding: '10px 20px', zIndex: '9999',
    pointerEvents: 'none', opacity: '0', transition: 'opacity 0.2s',
  });
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; });
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 220); }, 2800);
}

// ── PROJECT HELPERS ────────────────────────────────
function getCurrentProject() {
  return state.projects.find(p => p.id === state.currentProjectId) || null;
}

function newProjectData(id) {
  return { id, brandName: '', brief: '', style: 'wordmark', moodboardImages: [], moodboardAnalysis: null, generations: [] };
}

function saveProjects() {
  try {
    localStorage.setItem('sigil_projects', JSON.stringify(state.projects));
    localStorage.setItem('sigil_current_project', state.currentProjectId);
  } catch {
    // Try without moodboard images if quota exceeded
    try {
      const slim = state.projects.map(p => ({ ...p, moodboardImages: [] }));
      localStorage.setItem('sigil_projects', JSON.stringify(slim));
      localStorage.setItem('sigil_current_project', state.currentProjectId);
    } catch { /* silent fail */ }
  }
}

function initProjects() {
  const saved = localStorage.getItem('sigil_projects');
  const savedCurrent = localStorage.getItem('sigil_current_project');
  if (saved) {
    try { state.projects = JSON.parse(saved); } catch { state.projects = []; }
  }
  if (!state.projects.length) {
    const p = newProjectData(uid());
    state.projects.push(p);
  }
  state.currentProjectId = (savedCurrent && state.projects.find(p => p.id === savedCurrent))
    ? savedCurrent : state.projects[0].id;
}

function createProject() {
  syncCurrentProjectFromUI();
  const p = newProjectData(uid());
  state.projects.push(p);
  state.currentProjectId = p.id;
  loadProjectIntoUI(p);
  renderProjectsBar();
  saveProjects();
}

function switchProject(id) {
  if (id === state.currentProjectId) return;
  syncCurrentProjectFromUI();
  state.currentProjectId = id;
  loadProjectIntoUI(getCurrentProject());
  renderProjectsBar();
  saveProjects();
}

function deleteProject(id) {
  if (state.projects.length === 1) { toast('Cannot delete the last project.'); return; }
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.currentProjectId === id) {
    state.currentProjectId = state.projects[state.projects.length - 1].id;
    loadProjectIntoUI(getCurrentProject());
  }
  renderProjectsBar();
  saveProjects();
}

function syncCurrentProjectFromUI() {
  const p = getCurrentProject();
  if (!p) return;
  p.brandName = brandInput.value.trim();
  p.brief = briefInput.value.trim();
  p.style = document.querySelector('input[name="style"]:checked')?.value || 'wordmark';
}

function loadProjectIntoUI(p) {
  if (!p) return;
  brandInput.value = p.brandName;
  briefInput.value = p.brief;
  const radio = document.querySelector(`input[name="style"][value="${p.style}"]`);
  if (radio) radio.checked = true;
  // Moodboard
  const imgs = p.moodboardImages || [];
  moodboardPrompt.style.display = imgs.length ? 'none' : 'block';
  moodboardThumbs.style.display = imgs.length ? 'flex' : 'none';
  renderMoodboardThumbs(imgs);
  // Canvas
  metaBrand.textContent = p.brandName ? p.brandName.toUpperCase() : '—';
  metaDate.textContent = fmtDate(new Date());
  metaCount.textContent = p.generations.length ? `${p.generations.length} Generation${p.generations.length > 1 ? 's' : ''}` : '—';
  renderHistory(p);
}

// ── PROJECTS BAR ───────────────────────────────────
function renderProjectsBar() {
  projectsTabs.innerHTML = '';
  state.projects.forEach(p => {
    const tab = document.createElement('div');
    tab.className = 'project-tab' + (p.id === state.currentProjectId ? ' active' : '');
    tab.dataset.id = p.id;

    const name = document.createElement('span');
    name.className = 'tab-name';
    name.textContent = p.brandName || 'Untitled';

    const close = document.createElement('button');
    close.className = 'tab-close';
    close.textContent = '×';
    close.addEventListener('click', e => { e.stopPropagation(); deleteProject(p.id); });

    tab.appendChild(name);
    tab.appendChild(close);
    tab.addEventListener('click', () => switchProject(p.id));
    projectsTabs.appendChild(tab);
  });
}

// ── MOODBOARD ──────────────────────────────────────
async function handleFiles(fileList) {
  const p = getCurrentProject();
  if (!p) return;
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  for (const f of files) {
    const { dataUrl, base64 } = await readBase64(f);
    p.moodboardImages.push({ dataUrl, base64, mediaType: f.type });
  }
  renderMoodboard();
  saveProjects();
}

function readBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => { const d = e.target.result; resolve({ dataUrl: d, base64: d.split(',')[1] }); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function renderMoodboard() {
  const p = getCurrentProject();
  const imgs = p ? p.moodboardImages : [];
  moodboardPrompt.style.display = imgs.length ? 'none' : 'block';
  moodboardThumbs.style.display = imgs.length ? 'flex' : 'none';
  renderMoodboardThumbs(imgs);
}

function renderMoodboardThumbs(imgs) {
  moodboardThumbs.innerHTML = '';
  imgs.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'thumb-item';
    const rm = document.createElement('button');
    rm.className = 'thumb-remove';
    rm.textContent = '×';
    rm.addEventListener('click', e => {
      e.stopPropagation();
      const p = getCurrentProject();
      if (p) { p.moodboardImages.splice(i, 1); renderMoodboard(); saveProjects(); }
    });
    const el = document.createElement('img');
    el.src = img.dataUrl;
    el.alt = '';
    item.appendChild(el);
    item.appendChild(rm);
    moodboardThumbs.appendChild(item);
  });
}

// ── HISTORY RENDERING ──────────────────────────────
function renderHistory(p) {
  canvasHistory.innerHTML = '';
  if (!p || !p.generations.length) return;
  p.generations.forEach((gen, idx) => {
    canvasHistory.appendChild(buildGenerationBlock(gen, idx === 0));
  });
}

function buildGenerationBlock(gen, isLatest) {
  const block = document.createElement('div');
  block.className = 'generation-block' + (isLatest ? '' : ' stale');
  block.id = `gen-block-${gen.id}`;

  const header = document.createElement('div');
  header.className = 'generation-header';
  header.textContent = `[ Generation ${String(gen.num).padStart(2, '0')} — ${gen.timestamp} ]`;
  block.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'canvas-slots';

  [0, 1, 2].forEach(i => {
    grid.appendChild(buildSlotEl(gen, i));
  });

  block.appendChild(grid);
  return block;
}

function buildSlotEl(gen, i) {
  const slot = document.createElement('div');
  slot.className = 'logo-slot';

  const label = document.createElement('span');
  label.className = 'slot-label';
  label.textContent = `Option 0${i + 1}`;

  const markWrap = document.createElement('div');
  markWrap.className = 'slot-mark-wrap';
  markWrap.id = `slot-mark-${gen.id}-${i}`;

  const wordmarkWrap = document.createElement('div');
  wordmarkWrap.className = 'slot-wordmark-wrap';
  wordmarkWrap.id = `slot-wordmark-${gen.id}-${i}`;

  const tagsEl = document.createElement('div');
  tagsEl.className = 'slot-tags';
  tagsEl.id = `tags-${gen.id}-${i}`;

  const exportsEl = document.createElement('div');
  exportsEl.className = 'slot-exports';

  const btnSvg = document.createElement('button');
  btnSvg.className = 'export-btn';
  btnSvg.id = `export-svg-${gen.id}-${i}`;
  btnSvg.textContent = 'SVG';
  btnSvg.disabled = true;

  const btnPng = document.createElement('button');
  btnPng.className = 'export-btn';
  btnPng.id = `export-png-${gen.id}-${i}`;
  btnPng.textContent = 'PNG';
  btnPng.disabled = true;

  exportsEl.appendChild(btnSvg);
  exportsEl.appendChild(btnPng);

  slot.appendChild(label);
  slot.appendChild(markWrap);
  slot.appendChild(wordmarkWrap);
  slot.appendChild(tagsEl);
  slot.appendChild(exportsEl);

  const p = getCurrentProject();
  const brandName = p ? p.brandName : 'sigil';

  markWrap.addEventListener('click', () => {
    if (gen.results[i]?.markImageUrl || gen.results[i]?.wordmarkSvg) openLightbox(gen.id, i);
  });
  wordmarkWrap.addEventListener('click', () => {
    if (gen.results[i]?.wordmarkSvg) openLightbox(gen.id, i);
  });
  btnSvg.addEventListener('click', () => {
    const r = gen.results[i];
    const svg = r?.wordmarkSvg || r?.svg;
    if (svg) exportSVG(svg, `${slug(brandName)}-wordmark-${i + 1}.svg`);
  });
  btnPng.addEventListener('click', () => {
    const r = gen.results[i];
    if (r) exportCombinedPNG(r.markImageUrl, r.wordmarkSvg || r.svg, `${slug(brandName)}-logo-${i + 1}.png`);
  });

  if (gen.results[i]) {
    populateSlot(gen, i);
  } else {
    markWrap.innerHTML = '<div class="slot-loading-inner"><div class="loading-rect"></div><div class="loading-label">Generating mark…</div></div>';
    wordmarkWrap.innerHTML = '<div class="slot-loading-inner"><div class="loading-rect"></div><div class="loading-label">Generating…</div></div>';
  }

  return slot;
}

function populateSlot(gen, i) {
  const r = gen.results[i];
  if (!r) return;

  // Backward compat: old saves used r.svg, new format uses r.wordmarkSvg
  const wordmarkSvg = r.wordmarkSvg || r.svg;

  // Populate wordmark SVG
  const wordmarkWrap = $(`slot-wordmark-${gen.id}-${i}`);
  if (wordmarkWrap) {
    if (wordmarkSvg) {
      wordmarkWrap.innerHTML = wordmarkSvg;
      wordmarkWrap.classList.add('has-logo');
      const svg = wordmarkWrap.querySelector('svg');
      if (svg) {
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '100%');
        if (!svg.getAttribute('viewBox')) svg.setAttribute('viewBox', '0 0 600 300');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      }
    } else {
      wordmarkWrap.innerHTML = '<div class="slot-loading-inner"><div class="loading-rect"></div><div class="loading-label">Generating…</div></div>';
    }
  }

  // Populate mark image
  const markWrap = $(`slot-mark-${gen.id}-${i}`);
  if (markWrap) {
    if (r.markImageUrl) {
      const img = document.createElement('img');
      img.src = r.markImageUrl;
      img.alt = '';
      markWrap.innerHTML = '';
      markWrap.appendChild(img);
      markWrap.classList.add('has-mark');
    } else {
      markWrap.innerHTML = '<div class="slot-loading-inner"><div class="loading-rect"></div><div class="loading-label">Generating mark…</div></div>';
    }
  }

  // Enable export buttons as soon as wordmark is ready
  const btnSvg = $(`export-svg-${gen.id}-${i}`);
  const btnPng = $(`export-png-${gen.id}-${i}`);
  if (btnSvg) btnSvg.disabled = !wordmarkSvg;
  if (btnPng) btnPng.disabled = !wordmarkSvg;

  const tagsEl = $(`tags-${gen.id}-${i}`);
  if (tagsEl && r.tags) tagsEl.innerHTML = r.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
}

function setSlotError(genId, i, msg) {
  const markWrap = $(`slot-mark-${genId}-${i}`);
  const wordmarkWrap = $(`slot-wordmark-${genId}-${i}`);
  if (markWrap) markWrap.innerHTML = '';
  if (wordmarkWrap) {
    wordmarkWrap.innerHTML = `<div class="slot-error">[ Error ]<br><br>${escHtml(msg)}</div>`;
    wordmarkWrap.classList.remove('has-logo');
  }
}

// ── GENERATE ───────────────────────────────────────
async function generate() {
  const brand = brandInput.value.trim();
  const brief = briefInput.value.trim();
  if (!brand)         { toast('Enter a brand name.'); return; }
  if (!brief)         { toast('Enter a brief.'); return; }
  if (state.generating) return;

  state.generating = true;
  generateBtn.disabled    = true;
  generateBtn.textContent = 'Generating…';

  const p = getCurrentProject();
  p.brandName = brand;
  p.brief     = brief;
  p.style     = document.querySelector('input[name="style"]:checked')?.value || 'wordmark';
  p.moodboardAnalysis = null;

  // Create new generation
  const now = new Date();
  const gen = {
    id: uid(),
    num: p.generations.length + 1,
    timestamp: fmtTime(now),
    results: [null, null, null],
  };
  p.generations.unshift(gen);

  // Update meta bar
  metaBrand.textContent = brand.toUpperCase();
  metaDate.textContent  = fmtDate(now);
  metaCount.textContent = `${p.generations.length} Generation${p.generations.length > 1 ? 's' : ''}`;

  // Mark previous generation stale
  const firstBlock = canvasHistory.firstElementChild;
  if (firstBlock) firstBlock.classList.add('stale');

  // Prepend new generation block
  const block = buildGenerationBlock(gen, true);
  canvasHistory.insertBefore(block, canvasHistory.firstChild);
  canvasHistory.scrollTop = 0;

  // Update tab name
  renderProjectsBar();

  try {
    if (p.moodboardImages.length > 0) {
      p.moodboardAnalysis = await analyzeMoodboard(p.moodboardImages);
    }

    const hints = [
      'You are generating VARIATION 1 — the expected interpretation: refined, considered, directly responsive to the brief. The most resolved version of the obvious approach.',
      'You are generating VARIATION 2 — the bolder typographic move: push the tracking, scale, or weight contrast significantly further than feels safe. Make a stronger typographic statement.',
      'You are generating VARIATION 3 — the unexpected interpretation: choose a different structural approach or typographic register entirely. Something that surprises but feels exactly right for this brand.',
    ];

    await Promise.all(hints.map((h, i) => generateLogo(p, gen, i, h)));

  } catch (err) {
    [0, 1, 2].forEach(i => {
      if (!gen.results[i]) setSlotError(gen.id, i, err.message || 'Generation failed.');
    });
  } finally {
    state.generating         = false;
    generateBtn.disabled     = false;
    generateBtn.textContent  = 'Generate';
    saveProjects();
  }
}

// ── API: MOODBOARD VISION ──────────────────────────
async function analyzeMoodboard(images) {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ images: images.map(img => ({ base64: img.base64, mediaType: img.mediaType })) }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `Analysis failed (${res.status})`);
  }
  const data = await res.json();
  return data.analysis;
}

// ── API: LOGO GENERATION ───────────────────────────
async function generateLogo(p, gen, i, variationHint) {
  // Phase 1: Claude generates mark prompt + wordmark SVG
  const genRes = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      brandName: p.brandName,
      brief: p.brief,
      style: p.style,
      variationHint,
      moodboardAnalysis: p.moodboardAnalysis || null,
      moodboardImages: p.moodboardImages.map(img => ({ base64: img.base64, mediaType: img.mediaType })),
    }),
  });
  if (!genRes.ok) {
    const err = await genRes.json().catch(() => ({}));
    throw new Error(err.error || `Generation failed (${genRes.status})`);
  }
  const genData = await genRes.json();

  // Show wordmark immediately while Replicate runs
  gen.results[i] = { wordmarkSvg: genData.wordmarkSvg, markImageUrl: null, tags: buildTags(p) };
  populateSlot(gen, i);
  saveProjects();

  // Phase 2: Replicate generates mark image
  if (genData.markPrompt) {
    try {
      const repRes = await fetch('/api/replicate', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ prompt: genData.markPrompt }),
      });
      if (repRes.ok) {
        const repData = await repRes.json();
        if (repData.imageUrl) {
          gen.results[i].markImageUrl = repData.imageUrl;
          gen.results[i].markPrompt   = genData.markPrompt;
          populateSlot(gen, i);
        }
      }
    } catch { /* wordmark is still usable without the mark image */ }
  }
}


// ── TAGS ───────────────────────────────────────────
function buildTags(p) {
  if (!p.moodboardAnalysis) {
    const defaults = {
      'wordmark': ['pure typography', 'brand as type'],
      'monogram': ['letterform mark', 'initials'],
      'letterform': ['custom letter', 'abstract form'],
      'abstract': ['geometric mark', 'pure form'],
      'logomark-wordmark': ['mark + type', 'unified system'],
    };
    return defaults[p.style] || [];
  }
  return p.moodboardAnalysis.split('|').slice(0, 4).map(seg => {
    const v = seg.split(':').slice(1).join(':').trim().toLowerCase();
    return v || seg.trim().toLowerCase();
  }).filter(Boolean);
}

// ── LIGHTBOX ───────────────────────────────────────
function openLightbox(genId, slotIndex) {
  state.lightboxGenId = genId;
  state.lightboxSlot  = slotIndex;

  const p   = getCurrentProject();
  const gen = p?.generations.find(g => g.id === genId);
  const r   = gen?.results[slotIndex];
  if (!r) return;

  const lbMarkWrap     = $('lb-mark-wrap');
  const lbWordmarkWrap = $('lb-wordmark-wrap');

  // Mark image
  lbMarkWrap.innerHTML = '';
  if (r.markImageUrl) {
    const img = document.createElement('img');
    img.src = r.markImageUrl;
    img.alt = '';
    lbMarkWrap.appendChild(img);
  }

  // Wordmark SVG (backward compat: old saves used r.svg)
  const wordmarkSvg = r.wordmarkSvg || r.svg;
  lbWordmarkWrap.innerHTML = wordmarkSvg || '';
  const svg = lbWordmarkWrap.querySelector('svg');
  if (svg) {
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    if (!svg.getAttribute('viewBox')) svg.setAttribute('viewBox', '0 0 600 300');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  }

  const styleNames = { 'wordmark':'Wordmark','monogram':'Monogram','letterform':'Letterform','abstract':'Abstract','logomark-wordmark':'Logomark + Wordmark' };
  const label = [
    p.brandName.toUpperCase(),
    styleNames[p.style] || p.style,
    `Option 0${slotIndex + 1}`,
  ].filter(Boolean).join(' · ');
  $('lb-meta-info').textContent = label;
  lightbox.classList.remove('hidden');
}

function closeLightbox() {
  lightbox.classList.add('hidden');
  state.lightboxGenId = null;
  state.lightboxSlot  = null;
}

// ── EXPORT ─────────────────────────────────────────
function exportSVG(svgStr, filename) {
  const url = URL.createObjectURL(new Blob([svgStr], { type: 'image/svg+xml' }));
  trigger(url, filename);
  URL.revokeObjectURL(url);
}

async function exportCombinedPNG(markImageUrl, wordmarkSvg, filename) {
  const W = 800;
  const MARK_H = 800;
  const WORDMARK_H = 200;
  const canvas = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = MARK_H + WORDMARK_H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (markImageUrl) {
    await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => { ctx.drawImage(img, 0, 0, W, MARK_H); resolve(); };
      img.onerror = resolve;
      img.src = markImageUrl;
    });
  }

  if (wordmarkSvg) {
    await new Promise(resolve => {
      const blob = new Blob([wordmarkSvg], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();
      img.onload  = () => { ctx.drawImage(img, 0, MARK_H, W, WORDMARK_H); URL.revokeObjectURL(url); resolve(); };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(); };
      img.src = url;
    });
  }

  trigger(canvas.toDataURL('image/png'), filename);
}

function trigger(href, filename) {
  const a = document.createElement('a');
  a.href = href; a.download = filename; a.click();
}

// ── INIT ───────────────────────────────────────────
function init() {
  initProjects();

  metaDate.textContent = fmtDate(new Date());

  // Sidebar inputs → sync to current project
  brandInput.addEventListener('input', e => {
    const p = getCurrentProject(); if (p) { p.brandName = e.target.value.trim(); renderProjectsBar(); }
  });
  briefInput.addEventListener('input', e => {
    const p = getCurrentProject(); if (p) p.brief = e.target.value.trim();
  });
  document.querySelectorAll('input[name="style"]').forEach(r =>
    r.addEventListener('change', e => { const p = getCurrentProject(); if (p) p.style = e.target.value; })
  );
  generateBtn.addEventListener('click', generate);

  // Moodboard
  moodboardZone.addEventListener('click',     () => moodboardFile.click());
  moodboardZone.addEventListener('dragover',  e => { e.preventDefault(); moodboardZone.classList.add('drag-over'); });
  moodboardZone.addEventListener('dragleave', () => moodboardZone.classList.remove('drag-over'));
  moodboardZone.addEventListener('drop',      e => { e.preventDefault(); moodboardZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
  moodboardFile.addEventListener('change',    e => { handleFiles(e.target.files); moodboardFile.value = ''; });

  // Clear history
  clearHistoryBtn.addEventListener('click', () => {
    const p = getCurrentProject();
    if (!p || !p.generations.length) return;
    p.generations = [];
    p.moodboardAnalysis = null;
    canvasHistory.innerHTML = '';
    metaCount.textContent = '—';
    saveProjects();
  });

  // Lightbox
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  $('lb-close-btn').addEventListener('click', closeLightbox);
  $('lb-svg-btn').addEventListener('click', () => {
    const p   = getCurrentProject();
    const gen = p?.generations.find(g => g.id === state.lightboxGenId);
    const r   = gen?.results[state.lightboxSlot];
    const svg = r?.wordmarkSvg || r?.svg;
    if (svg) exportSVG(svg, `${slug(p.brandName)}-wordmark-${state.lightboxSlot + 1}.svg`);
  });
  $('lb-png-btn').addEventListener('click', () => {
    const p   = getCurrentProject();
    const gen = p?.generations.find(g => g.id === state.lightboxGenId);
    const r   = gen?.results[state.lightboxSlot];
    if (r) exportCombinedPNG(r.markImageUrl, r.wordmarkSvg || r.svg, `${slug(p.brandName)}-logo-${state.lightboxSlot + 1}.png`);
  });

  // Projects bar
  $('new-project-btn').addEventListener('click', createProject);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // Render initial state
  renderProjectsBar();
  loadProjectIntoUI(getCurrentProject());
}

init();
</script>
